<style>
    .addkomm {
        background-color: #f5f5f5;
        padding: 16px;
    }

    .addkomm div {
        padding: 4px;
    }

    md-input-container {
        margin: 0;
    }
</style>
<div class="addkomm">
    <form name="$ctrl.formular" layout="column">
        <md-input-container>
            <label>Username</label>
            <input type="text" name="username" ng-model="$ctrl.username" required>
        </md-input-container>
        <md-input-container>
            <textarea name="text" ng-model="$ctrl.text" required md-maxlength="150"></textarea>
        </md-input-container>
    </form>
    <div layout="row" layout-align="space-between center">
        <md-button class="md-icon-button md-raised md-primary"
                   ng-click="$ctrl.cancel()">
            <md-icon>clear</md-icon>
        </md-button>
        <md-button class="md-icon-button md-raised md-primary"
                   ng-click="$ctrl.send()">
            <md-icon>send</md-icon>
        </md-button>
    </div>
</div>
